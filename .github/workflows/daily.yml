name: Daily Build

on:
  schedule:
    # Runs at midnight UTC every day (adjust if you want a different timezone)
    - cron: '0 0 * * *'
  # Also allows you to trigger it manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run build script
        run: python build.py

      - name: Commit and push updated index.html
        run: |
          git config --global user.name "ReadLikeRay Bot"
          git config --global user.email "bot@readlikeray.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Day $(date +%Y-%m-%d): Daily reading update"
          git push
